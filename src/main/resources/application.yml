spring:
  application:
    name: callisto-doc-enterprise
  datasource:
    url: ${DB_URL:jdbc:h2:mem:callistodev;DB_CLOSE_DELAY=-1}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  threads:
    virtual:
      enabled: true

azure:
  doc-intel:
    endpoints:
      - url: ${AZURE_DI_ENDPOINT:https://placeholder.cognitiveservices.azure.com/}
        key: ${AZURE_DI_KEY:placeholder}

# Spring AI — Groq (OpenAI-compatible, fast inference for structured summaries)
spring:
  ai:
    openai:
      api-key: ${GROQ_API_KEY:placeholder}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: ${GROQ_MODEL:llama-3.3-70b-versatile}
          temperature: 0.2   # low temperature — summaries should be factual, not creative
          max-tokens: 512    # summaries are short; cap spend

callisto:
  batch:
    max-concurrency: 8
    chunk-size: 10
  extraction:
    confidence-threshold: 0.50
    high-threshold: 500
    medium-threshold: 100
  summary:
    enabled: ${SUMMARY_ENABLED:true}   # set false to skip LLM call (e.g. in tests or if no GROQ_API_KEY)

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    io.callistotech: INFO
    org.springframework.security: WARN
